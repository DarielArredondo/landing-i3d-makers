<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" aria-hidden="true">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e83e9"/>
      <stop offset="50%" stop-color="#6c3bd9"/>
      <stop offset="100%" stop-color="#e91d7a"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e83e9"/>
      <stop offset="100%" stop-color="#6c3bd9"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6c3bd9"/>
      <stop offset="100%" stop-color="#e91d7a"/>
    </linearGradient>
  </defs>
  <!-- top face -->
  <polygon points="100,20 170,55 100,90 30,55" fill="#1e83e9" opacity=".95"/>
  <!-- left face -->
  <polygon points="30,55 100,90 100,170 30,135" fill="url(#g2)"/>
  <!-- right face -->
  <polygon points="170,55 100,90 100,170 170,135" fill="url(#g3)"/>
  <!-- "i3D" glyph -->
  <g fill="#ffffff" font-family="'Montserrat', sans-serif" font-weight="900" letter-spacing="-2">
    <text x="52" y="130" font-size="44" transform="skewY(-15)">i3D</text>
  </g>
  <!-- edge highlights -->
  <polyline points="100,20 170,55 100,90 30,55 100,20" fill="none" stroke="#fff" stroke-opacity=".5" stroke-width="1.2"/>
  <line x1="100" y1="90" x2="100" y2="170" stroke="#fff" stroke-opacity=".35" stroke-width="1.2"/>
</svg>
